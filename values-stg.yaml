name: assignment-service

replicaCount: 1

image:
  repository: vucongtuanduong/grading-assignment
  tag: "latest"
  pullPolicy: Always

global:
  domain: vucongtuanduong.dpdns.org
  prefix: dev2

spring:
  profilesActive: stg

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
